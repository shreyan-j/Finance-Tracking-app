<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceOS — Minimal Tracker</title>
    <!-- Chart.js for the ring chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #191919;
            --bg-secondary: #202020;
            --bg-tertiary: #2F2F2F;
            --text-main: #E3E3E3;
            --text-muted: #8F8F8F;
            --accent: #37352F;
            --border: #2F2F2F;
            --spent: #eb5757;
            --received: #27ae60;
            --radius: 6px;
            --font: "inter", system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font);
            line-height: 1.5;
            padding-bottom: 80px;
        }

        /* Layout */
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        header { margin-bottom: 32px; }
        
        .nav-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .nav-tab {
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-tab.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); }

        /* Search & Filters */
        .search-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 12px;
            width: 100%;
            color: white;
            margin-bottom: 12px;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .filter-chip {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
        }
        .filter-chip.active { background: var(--text-main); color: var(--bg-primary); }

        /* Transaction List */
        .transaction-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }
        .tx-left { display: flex; flex-direction: column; }
        .tx-title { font-weight: 500; font-size: 14px; }
        .tx-sub { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
        .tx-right { text-align: right; }
        .tx-amount { font-weight: 600; font-family: monospace; font-size: 15px; }
        .tx-amount.neg { color: var(--spent); }
        .tx-amount.pos { color: var(--received); }

        /* Tags (Pills) */
        .pill {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
        }

        /* Modal / Form */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--bg-secondary);
            width: 90%;
            max-width: 450px;
            border-radius: 12px;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: var(--radius);
            outline: none;
        }
        .btn-primary {
            background: #E3E3E3;
            color: #191919;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
        }

        /* Analytics View */
        .analytics-grid { display: grid; gap: 20px; }
        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .budget-progress {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--text-muted); transition: 0.3s; }
        
        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: #E3E3E3;
            color: #191919;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 99;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchPage('home')">Transactions</div>
                <div class="nav-tab" onclick="switchPage('analytics')">Dashboard</div>
            </div>

            <div id="home-controls">
                <input type="text" class="search-box" id="globalSearch" placeholder="Search title or notes..." oninput="renderTransactions()">
                <div class="filter-bar" id="categoryFilters">
                    <!-- Dynamic Category Chips -->
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <span style="font-size: 12px; color: var(--text-muted);" id="txCount">Showing 0 items</span>
                    <div style="display: flex; gap: 10px;">
                        <span class="pill" style="cursor:pointer" onclick="toggleSort('date')">Sort by Date ↓</span>
                        <span class="pill" style="cursor:pointer" onclick="toggleSort('amount')">Sort by Amount</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- PAGE 1: TRANSACTION FEED -->
        <main id="home-view">
            <div id="transactionList"></div>
        </main>

        <!-- PAGE 2: ANALYTICS -->
        <main id="analytics-view" style="display: none;">
            <div class="analytics-grid">
                <div class="stat-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h4 style="color:var(--text-muted); font-size:14px;">Monthly Budget</h4>
                        <span class="pill" onclick="setBudget()">Set Budget</span>
                    </div>
                    <div id="budgetStatus" style="font-size: 24px; margin: 10px 0;">₹0 / ₹0</div>
                    <div class="budget-progress"><div id="budgetFill" class="progress-fill"></div></div>
                </div>

                <div class="stat-card">
                    <h4 style="color:var(--text-muted); font-size:14px;">Savings This Month</h4>
                    <div id="savingsMetric" style="font-size: 24px; margin: 10px 0; color: var(--received);">₹0</div>
                </div>

                <div class="stat-card">
                    <h4 style="color:var(--text-muted); font-size:14px; margin-bottom: 15px;">Category Spending</h4>
                    <canvas id="categoryChart" width="400" height="400"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- FAB -->
    <div class="fab" onclick="openModal()">+</div>

    <!-- MODAL FORM -->
    <div class="modal" id="txModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <h3 style="font-weight: 500;">New Transaction</h3>
                <span style="cursor:pointer" onclick="closeModal()">✕</span>
            </div>
            
            <form id="txForm">
                <div class="form-group">
                    <label>Amount (₹) *</label>
                    <input type="number" id="f_amount" required placeholder="0.00" onblur="checkContextualFill()">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="f_title" placeholder="Coffee, Rent, etc.">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="f_type">
                            <option value="Spent">Spent</option>
                            <option value="Received">Received</option>
                            <option value="Saved">Saved</option>
                            <option value="Withdrawn">Withdrawn</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="f_date">
                    </div>
                </div>
                <div class="form-group">
                    <label>Category (Type new to add)</label>
                    <input list="categoryList" id="f_category" placeholder="Select or type...">
                    <datalist id="categoryList"></datalist>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="f_method">
                        <option value="Credit Card">Credit Card</option>
                        <option value="Cash">Cash</option>
                        <option value="Google Pay">Google Pay</option>
                        <option value="WhatsApp Pay">WhatsApp Pay</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location / Notes</label>
                    <input type="text" id="f_location" placeholder="Starbucks, Downtown...">
                </div>
                <button type="submit" class="btn-primary">Save Transaction</button>
            </form>
        </div>
    </div>

    <script>
        // State Management
        let transactions = JSON.parse(localStorage.getItem('fin_txs')) || [
            { id: 1, title: 'Initial Balance', amount: 5000, category: 'Income', date: '2024-05-01', method: 'Bank Transfer', type: 'Received', notes: '', location: 'Office' },
            { id: 2, title: 'Starbucks', amount: 450, category: 'Food', date: '2024-05-28', method: 'Google Pay', type: 'Spent', notes: 'Late night latte', location: 'Cyber City' }
        ];
        let budget = parseFloat(localStorage.getItem('fin_budget')) || 25000;
        let categories = [...new Set(transactions.map(t => t.category))];
        let currentSort = { key: 'date', direction: 'desc' };
        let activeFilter = 'All';

        // Initialize App
        function init() {
            renderTransactions();
            updateCategoryDatalist();
            updateBudgetUI();
            initChart();
        }

        // Navigation
        function switchPage(page) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (page === 'home') {
                document.getElementById('home-view').style.display = 'block';
                document.getElementById('home-controls').style.display = 'block';
                document.getElementById('analytics-view').style.display = 'none';
                renderTransactions();
            } else {
                document.getElementById('home-view').style.display = 'none';
                document.getElementById('home-controls').style.display = 'none';
                document.getElementById('analytics-view').style.display = 'block';
                updateAnalytics();
            }
        }

        // --- Core Logic ---

        function renderTransactions() {
            const list = document.getElementById('transactionList');
            const search = document.getElementById('globalSearch').value.toLowerCase();
            
            let filtered = transactions.filter(t => {
                const matchesSearch = t.title.toLowerCase().includes(search) || t.notes.toLowerCase().includes(search);
                const matchesCat = activeFilter === 'All' || t.category === activeFilter;
                return matchesSearch && matchesCat;
            });

            // Sorting
            filtered.sort((a, b) => {
                let valA = a[currentSort.key];
                let valB = b[currentSort.key];
                if (currentSort.key === 'amount') {
                    valA = parseFloat(valA); valB = parseFloat(valB);
                }
                return currentSort.direction === 'desc' ? (valB > valA ? 1 : -1) : (valA > valB ? 1 : -1);
            });

            document.getElementById('txCount').innerText = `Showing ${filtered.length} items`;

            list.innerHTML = filtered.map(t => `
                <div class="transaction-card">
                    <div class="tx-left">
                        <span class="tx-title">${t.title || 'Untitled'}</span>
                        <div class="tx-sub">
                            <span>${new Date(t.date).toLocaleDateString('en-IN', {month: 'short', day: 'numeric'})}</span>
                            <span class="pill">${t.category}</span>
                            <span style="font-size:10px">•</span>
                            <span style="color:var(--text-muted)">${t.method}</span>
                        </div>
                    </div>
                    <div class="tx-right">
                        <div class="tx-amount ${t.type === 'Spent' || t.type === 'Withdrawn' ? 'neg' : 'pos'}">
                            ${t.type === 'Spent' || t.type === 'Withdrawn' ? '-' : '+'}₹${Math.abs(t.amount).toLocaleString()}
                        </div>
                        <div style="font-size:11px; color:var(--text-muted)">${t.type}</div>
                    </div>
                </div>
            `).join('');

            renderFilterChips();
        }

        function renderFilterChips() {
            const bar = document.getElementById('categoryFilters');
            const cats = ['All', ...categories];
            bar.innerHTML = cats.map(c => `
                <div class="filter-chip ${activeFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>
            `).join('');
        }

        function setFilter(c) {
            activeFilter = c;
            renderTransactions();
        }

        function toggleSort(key) {
            if (currentSort.key === key) {
                currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
            } else {
                currentSort.key = key;
                currentSort.direction = 'desc';
            }
            renderTransactions();
        }

        // --- Intelligent Form Logic ---

        function openModal() {
            const modal = document.getElementById('txModal');
            modal.style.display = 'flex';
            
            // 1. Auto-Focus Amount
            const amountInput = document.getElementById('f_amount');
            setTimeout(() => amountInput.focus(), 100);

            // 2. Smart Pre-selection (Date & Frequent Method)
            document.getElementById('f_date').valueAsDate = new Date();
            
            if (transactions.length > 0) {
                const methods = transactions.map(t => t.method);
                const mostFrequent = methods.sort((a,b) =>
                    methods.filter(v => v===a).length - methods.filter(v => v===b).length
                ).pop();
                document.getElementById('f_method').value = mostFrequent;
            }
        }

        function closeModal() {
            document.getElementById('txModal').style.display = 'none';
            document.getElementById('txForm').reset();
        }

        // 3. Contextual Auto-Fill
        function checkContextualFill() {
            const currentAmt = parseFloat(document.getElementById('f_amount').value);
            if (!currentAmt) return;

            const match = transactions.find(t => t.amount === currentAmt);
            if (match) {
                document.getElementById('f_title').value = match.title;
                document.getElementById('f_category').value = match.category;
                document.getElementById('f_location').value = match.location;
                // Visual feedback
                document.getElementById('f_title').style.borderColor = 'var(--received)';
                setTimeout(() => document.getElementById('f_title').style.borderColor = 'var(--border)', 1000);
            }
        }

        document.getElementById('txForm').onsubmit = function(e) {
            e.preventDefault();
            
            const newCat = document.getElementById('f_category').value;
            // 4. Dynamic Taxonomy
            if (newCat && !categories.includes(newCat)) {
                categories.push(newCat);
                updateCategoryDatalist();
            }

            const newTx = {
                id: Date.now(),
                title: document.getElementById('f_title').value,
                amount: parseFloat(document.getElementById('f_amount').value),
                category: newCat || 'Uncategorized',
                date: document.getElementById('f_date').value,
                method: document.getElementById('f_method').value,
                type: document.getElementById('f_type').value,
                location: document.getElementById('f_location').value,
                notes: ''
            };

            transactions.unshift(newTx);
            localStorage.setItem('fin_txs', JSON.stringify(transactions));
            
            renderTransactions();
            closeModal();
        };

        function updateCategoryDatalist() {
            const dl = document.getElementById('categoryList');
            dl.innerHTML = categories.map(c => `<option value="${c}">`).join('');
        }

        // --- Analytics Logic ---

        let myChart;
        function updateAnalytics() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const thisMonthTxs = transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            const spent = thisMonthTxs
                .filter(t => t.type === 'Spent' || t.type === 'Withdrawn')
                .reduce((sum, t) => sum + t.amount, 0);
            
            const saved = thisMonthTxs
                .filter(t => t.type === 'Saved')
                .reduce((sum, t) => sum + t.amount, 0);

            // Update Budget UI
            document.getElementById('budgetStatus').innerText = `₹${spent.toLocaleString()} / ₹${budget.toLocaleString()}`;
            const perc = Math.min((spent / budget) * 100, 100);
            document.getElementById('budgetFill').style.width = perc + '%';
            document.getElementById('budgetFill').style.background = perc > 90 ? 'var(--spent)' : 'var(--text-muted)';

            document.getElementById('savingsMetric').innerText = `₹${saved.toLocaleString()}`;

            // Chart Data
            const catData = {};
            thisMonthTxs.filter(t => t.type === 'Spent').forEach(t => {
                catData[t.category] = (catData[t.category] || 0) + t.amount;
            });

            updateChart(catData);
        }

        function initChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: ['#2f2f2f', '#444444', '#555555', '#666666', '#888888'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#8F8F8F', usePointStyle: true } } }
                }
            });
        }

        function updateChart(data) {
            myChart.data.labels = Object.keys(data);
            myChart.data.datasets[0].data = Object.values(data);
            myChart.update();
        }

        function setBudget() {
            const b = prompt("Enter monthly budget:", budget);
            if (b) {
                budget = parseFloat(b);
                localStorage.setItem('fin_budget', budget);
                updateAnalytics();
            }
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
